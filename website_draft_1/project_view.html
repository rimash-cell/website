<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | Rima Alshoufi</title>
    <meta name="description" content="Legacy project view for Rima Alshoufi. Use the main work archive to browse current case studies.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="canonical" href="https://rimaalshoufi.com/work">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta property="og:site_name" content="Rima Alshoufi">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Project | Rima Alshoufi">
    <meta property="og:description" content="Project by Rima Alshoufi, spatial experience designer based in Dubai.">
    <meta property="og:url" content="https://rimaalshoufi.com/project_view.html">
    <meta property="og:image" content="https://rimaalshoufi.com/og-image-v3.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="675">
    <meta property="og:image:alt" content="Portrait of Rima Alshoufi with portfolio branding">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Project | Rima Alshoufi">
    <meta name="twitter:description" content="Project by Rima Alshoufi, spatial experience designer based in Dubai.">
    <meta name="twitter:image" content="https://rimaalshoufi.com/og-image-v3.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@200;300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* ═══════════════════════════════════════════════
           PROJECT PAGE V5 — DYNAMIC EDITORIAL CAROUSEL
           Approved structure from project-khaltat-approved.html
           ═══════════════════════════════════════════════ */

        /* ─── NAV OVERRIDES ─── */
        .proj-nav {
            background: transparent;
        }

        .proj-nav.scrolled {
            background: linear-gradient(to bottom, rgba(250, 249, 247, 0.96) 0%, rgba(250, 249, 247, 0.88) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: var(--hl);
        }

        .proj-nav .logo,
        .proj-nav .nav-links a {
            color: var(--bk);
            text-shadow: none;
        }

        .proj-nav .nav-links a {
            opacity: 0.6;
        }

        .proj-nav .nav-links a.active,
        .proj-nav .nav-links a:hover,
        .proj-nav .nav-links a.cta {
            opacity: 1;
        }

        .proj-nav .nav-links a.cta span::after {
            background: currentColor;
        }

        /* ─── ANIMATIONS ─── */
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.165, 0.84, 0.44, 1), transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .reveal-up.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── 1. HEADER ─── */
        .proj-header {
            padding: 156px var(--px) 52px;
            max-width: 1120px;
            margin: 0 auto;
        }

        .proj-taxonomy {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
            margin-bottom: 20px;
        }

        .proj-taxi-sep {
            width: 16px;
            height: 0.5px;
            background: rgba(0, 0, 0, 0.1);
        }

        .proj-title {
            font-size: clamp(46px, 6.2vw, 86px);
            font-weight: 200;
            letter-spacing: -0.045em;
            line-height: 0.96;
            color: #0a0a0a;
            max-width: 900px;
            margin-bottom: 24px;
        }

        .proj-essence {
            font-size: clamp(17px, 2vw, 22px);
            font-weight: 300;
            line-height: 1.75;
            color: rgba(10, 10, 10, 0.58);
            max-width: 760px;
            margin-bottom: 40px;
        }

        .proj-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 20px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.54);
            align-items: center;
        }

        .proj-meta span:not(:last-child)::after {
            content: "";
            width: 3px;
            height: 3px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            display: inline-block;
            margin-left: 20px;
            vertical-align: middle;
        }

        /* ─── 2. HERO VISUAL ─── */
        .proj-hero {
            width: min(1400px, calc(100vw - 48px));
            height: clamp(320px, 56vw, 720px);
            margin: 0 auto;
            background: #e8e4de;
            position: relative;
            overflow: hidden;
        }

        .proj-hero img,
        .proj-hero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(0.96) brightness(0.98);
        }

        /* ─── 3. INTRO (STICKY SPLIT) ─── */
        .proj-intro-split {
            max-width: 1180px;
            margin: 0 auto;
            padding: 88px var(--px) 72px;
            display: grid;
            grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
            gap: clamp(36px, 6vw, 84px);
            align-items: start;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
        }

        .intro-left {
            position: sticky;
            top: 124px;
        }

        .intro-sticky-title {
            font-size: clamp(30px, 3.8vw, 48px);
            font-weight: 200;
            line-height: 1.14;
            letter-spacing: -0.03em;
            color: #0a0a0a;
            max-width: 430px;
            margin: 0;
        }

        .intro-right {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .br-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
            margin-bottom: 12px;
            display: block;
        }

        .br-text {
            font-size: 16px;
            font-weight: 300;
            line-height: 1.9;
            color: rgba(10, 10, 10, 0.72);
            max-width: 100%;
        }

        /* ─── NARRATIVE STORY BLOCK ─── */
        .proj-story-block {
            background-color: var(--ww);
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            padding: 88px 0;
            display: flex;
            flex-direction: column;
            gap: 80px;
            border-top: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        .proj-concept {
            max-width: 1120px;
            margin: 0 auto;
            text-align: left;
            padding: 0 var(--px);
        }

        .proj-concept-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
            margin-bottom: 20px;
            display: block;
        }

        .proj-concept-name {
            font-size: clamp(34px, 4.6vw, 60px);
            font-weight: 200;
            letter-spacing: -0.04em;
            line-height: 1.04;
            color: #0a0a0a;
            max-width: 840px;
            margin-bottom: 18px;
        }

        .proj-concept-body {
            font-size: clamp(17px, 1.9vw, 21px);
            font-weight: 300;
            line-height: 1.82;
            color: rgba(10, 10, 10, 0.68);
            max-width: 820px;
            margin: 0;
        }

        /* ─── 5. HORIZONTAL CANVAS ─── */
        .proj-canvas {
            display: flex;
            gap: 16px;
            padding: 0 var(--px) 24px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
            justify-content: flex-start;
            scroll-snap-type: x proximity;
        }

        .proj-canvas:active {
            cursor: grabbing;
        }

        .proj-canvas::-webkit-scrollbar {
            display: none;
        }

        .canvas-module {
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #ece7df;
            scroll-snap-align: start;
        }

        .canvas-module.landscape {
            height: clamp(220px, 34vh, 420px);
            aspect-ratio: 16/10;
        }

        .canvas-module.portrait {
            height: clamp(220px, 34vh, 420px);
            aspect-ratio: 3/4;
        }

        .canvas-module.square {
            height: clamp(220px, 34vh, 420px);
            aspect-ratio: 1;
        }

        .canvas-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(0.9);
            transition: transform 0.9s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: none;
        }

        .canvas-module:hover .canvas-img {
            transform: scale(1.03);
        }

        /* ─── CANVAS SCROLL INDICATOR ─── */
        .canvas-wrap {
            position: relative;
        }

        .canvas-scroll-hint {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 0 var(--px) 14px;
            pointer-events: none;
        }

        .canvas-count {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
        }

        .canvas-arrow-hint {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .canvas-progress-bar {
            height: 1px;
            background: rgba(0,0,0,0.08);
            margin: 0 var(--px);
            position: relative;
            overflow: hidden;
        }

        .canvas-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--bk);
            width: 18%;
            transition: width 0.3s ease;
        }

        /* ─── 6. FILMS GRID ─── */
        .proj-films-wrap {
            padding: 12px var(--px) 0;
            max-width: 1180px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            gap: 24px;
            justify-items: center;
        }

        .proj-films-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
            display: block;
            width: min(100%, 980px);
            text-align: left;
        }

        .proj-films-grid {
            width: min(100%, 980px);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 320px));
            justify-content: center;
            justify-items: center;
            gap: 28px;
        }

        .proj-films-grid.has-single {
            grid-template-columns: minmax(280px, 360px);
            max-width: 360px;
        }

        .proj-films-grid.all-short {
            grid-template-columns: repeat(auto-fit, minmax(220px, 280px));
            max-width: 920px;
        }

        .film-module {
            position: relative;
            background: #e7e2db;
            aspect-ratio: 16/9;
            overflow: hidden;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            border: 0.5px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 40px rgba(15, 15, 15, 0.06);
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
        }

        .film-module.short {
            aspect-ratio: 9/16;
            max-width: 280px;
        }

        .proj-films-grid.has-single .film-module {
            max-width: 360px;
        }

        .proj-films-grid.has-single .film-module.short {
            max-width: 280px;
        }

        .film-module::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10, 10, 10, 0.42) 0%, rgba(10, 10, 10, 0.06) 42%, rgba(10, 10, 10, 0) 68%);
            pointer-events: none;
        }

        .film-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .film-module:hover {
            transform: translateY(-4px);
            box-shadow: 0 28px 48px rgba(15, 15, 15, 0.1);
            border-color: rgba(143, 132, 119, 0.22);
        }

        .film-module:hover .film-cover {
            transform: scale(1.04);
        }

        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: transform 0.35s ease, background 0.35s ease;
            z-index: 2;
        }

        .film-module:hover .video-play-btn {
            transform: translate(-50%, -50%) scale(1.06);
            background: rgba(255, 255, 255, 0.3);
        }

        .video-play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 16px;
            border-color: transparent transparent transparent #fff;
            margin-left: 6px;
        }

        .film-caption {
            position: absolute;
            left: 20px;
            bottom: 18px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #fff;
            z-index: 2;
        }

        .film-module.short .film-caption {
            left: 18px;
            bottom: 16px;
        }

        /* ─── 7. WHAT I LED ─── */
        .proj-scope {
            display: flex;
            flex-direction: column;
            gap: 12px;
            list-style: none;
            padding: 0;
            margin-top: 8px;
        }

        .proj-scope-item {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--bk);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .proj-scope-item::before {
            content: "";
            width: 5px;
            height: 5px;
            background: var(--br);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── 8. PROOF ─── */
        .proj-proof-wrap {
            padding: 0 var(--px);
            max-width: 1120px;
            margin: 0 auto;
            text-align: left;
        }

        .proj-proof-statement {
            max-width: 760px;
            margin: 0;
            font-size: clamp(18px, 2.4vw, 24px);
            font-weight: 300;
            line-height: 1.85;
            color: rgba(10, 10, 10, 0.58);
        }

        .proj-proof-statement strong,
        .proj-proof-statement span {
            color: #0a0a0a;
            font-weight: 400;
        }

        /* ─── FOOTER NAV ─── */
        .proj-footer-nav {
            padding: 88px var(--px);
            border-top: var(--hl);
        }

        .footer-nav-shell {
            max-width: 1120px;
            margin: 0 auto;
            display: grid;
            gap: 32px;
        }

        .nav-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            align-items: start;
        }

        .nav-container.single {
            grid-template-columns: minmax(0, 1fr);
            max-width: 560px;
        }

        .nav-container:empty {
            display: none;
        }

        .nav-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 22px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: #fbf9f5;
            transition: transform 0.35s ease, border-color 0.35s ease, background 0.35s ease;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            border-color: rgba(143, 132, 119, 0.28);
            background: #f7f2ea;
        }

        .nav-card-back {
            min-height: 0;
            justify-content: flex-start;
        }

        .nav-content {
            display: grid;
            gap: 10px;
        }

        .nav-img-box {
            aspect-ratio: 16/10;
            overflow: hidden;
            background: #efebe5;
        }

        .nav-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s;
        }

        .nav-card:hover .nav-img-box img {
            transform: scale(1.03);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.38);
        }

        .nav-title {
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 200;
            line-height: 1.1;
            color: #0a0a0a;
        }

        .footer-nav-cta {
            display: flex;
            justify-content: center;
        }

        /* ─── MODALS ─── */
        .video-modal,
        .img-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .video-modal.is-active,
        .img-lightbox.is-active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-close,
        .img-lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 0.5px solid rgba(255, 255, 255, 0.14);
            color: #fff;
            font-size: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            line-height: 1;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: min(1120px, calc(100vw - 64px));
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
            background: #000;
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.28);
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .modal-content.video-locked iframe {
            pointer-events: none;
        }

        .modal-content.video-youtube.video-landscape iframe {
            width: 118%;
            height: 132%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .modal-content.video-youtube.video-shorts {
            width: min(420px, calc(100vw - 80px));
            aspect-ratio: 9/16;
        }

        .modal-content.video-youtube.video-shorts iframe {
            width: 168%;
            height: 112%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .modal-content.video-vimeo.video-shorts,
        .modal-content.video-direct.video-shorts {
            width: min(420px, calc(100vw - 80px));
            aspect-ratio: 9/16;
        }

        .img-lb-content {
            width: min(1280px, calc(100vw - 96px));
            height: 82vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-lb-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .img-lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.45);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 50%;
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-lb-nav:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .img-lb-nav svg {
            width: 24px;
            height: 24px;
            display: block;
        }

        .img-lb-prev { left: 16px; }
        .img-lb-next { right: 16px; }

        /* ─── LOADING ─── */
        #loading {
            padding: 180px var(--px) 120px;
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(10, 10, 10, 0.42);
            min-height: 60vh;
        }

        /* ─── RESPONSIVE ─── */
        @media(max-width: 900px) {
            .proj-header {
                padding: 136px var(--px) 44px;
            }

            .proj-intro-split {
                grid-template-columns: 1fr;
                gap: 48px;
                padding: 72px var(--px) 60px;
            }

            .intro-left {
                position: relative;
                top: 0;
            }

            .proj-hero {
                width: calc(100vw - 32px);
                height: clamp(260px, 62vw, 460px);
            }

            .proj-story-block {
                padding: 72px 0;
                gap: 64px;
            }

            .nav-container {
                grid-template-columns: 1fr;
                gap: 28px;
            }

            .proj-footer-nav {
                padding: 72px var(--px);
            }

            .img-lb-content {
                width: calc(100vw - 32px);
                height: 78vh;
            }
        }

        @media(max-width: 640px) {
            .proj-header, .proj-intro-split, .proj-proof-wrap, .proj-films-wrap, .proj-footer-nav {
                padding-left: 20px;
                padding-right: 20px;
            }

            .proj-concept,
            .canvas-scroll-hint {
                padding-left: 20px;
                padding-right: 20px;
            }

            .proj-canvas {
                padding-left: 20px;
                padding-right: 20px;
            }

            .canvas-progress-bar {
                margin: 0 20px;
            }

            .img-lb-prev { left: 8px; }
            .img-lb-next { right: 8px; }

            .modal-close,
            .img-lightbox-close {
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>

<body>
    <nav id="proj-nav-bar" class="dark-mode proj-nav">
        <a href="/" class="logo">RIMA <span>ALSHOUFI</span></a>
        <div class="nav-links">
            <a href="/#about">About</a>
            <a href="/work" class="active">Work</a>
            <a href="/connect" class="cta"><span>Connect</span></a>
        </div>
    </nav>

    <!-- LOADING STATE -->
    <div id="loading">Loading project...</div>

    <!-- 1. HEADER -->
    <header class="proj-header reveal-up" id="header" style="display:none;">
        <div class="proj-taxonomy" id="taxonomy"></div>
        <h1 class="proj-title" id="title"></h1>
        <p class="proj-essence" id="essence"></p>
        <div class="proj-meta" id="meta"></div>
    </header>

    <!-- 2. HERO VISUAL -->
    <section class="proj-hero" id="hero" style="display:none;"></section>

    <!-- 3. INTRO (STICKY SPLIT) -->
    <section class="proj-intro-split" id="intro" style="display:none;">
        <div class="intro-left">
            <h2 class="intro-sticky-title" id="sticky_title"></h2>
        </div>
        <div class="intro-right" id="intro_right">
            <div class="br-block" id="block_ask">
                <span class="br-label">The Challenge</span>
                <p class="br-text" id="ask_text"></p>
            </div>
            <div class="br-block" id="block_response">
                <span class="br-label">The Solution</span>
                <p class="br-text" id="response_text"></p>
            </div>
            <div class="br-block" id="block_scope">
                <span class="br-label">Creative Leadership</span>
                <ul class="proj-scope" id="scope_list"></ul>
            </div>
        </div>
    </section>

    <!-- 4. STORY BLOCK — dynamically built -->
    <div class="proj-story-block reveal-up" id="story_block" style="display:none;"></div>

    <!-- FOOTER NAV — dynamically populated -->
    <section class="proj-footer-nav reveal-up" id="footer_nav" style="display:none;">
        <div class="footer-nav-shell">
            <div class="nav-container" id="nav_container"></div>
            <div class="footer-nav-cta">
                <a href="/work" class="btn-all-work"><span>Back to Selected Work</span> <i>→</i></a>
            </div>
        </div>
    </section>

    <footer>
        <div class="f-logo">RIMA <span>ALSHOUFI</span></div>
        <div class="f-links">
            <a href="/#about">About</a>
            <a href="/work">Work</a>
            <a href="/connect">Connect</a>
        </div>
        <div class="f-copy">Spatial Experience Designer · Dubai, UAE · © 2026</div>
    </footer>

    <!-- LIGHTBOX -->
    <div id="imgLightbox" class="img-lightbox">
        <button class="img-lightbox-close" id="imgLightboxClose">×</button>
        <div class="img-lb-content">
            <button class="img-lb-nav img-lb-prev" id="imgLbPrev">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <img id="lbImg" src="" alt="">
            <button class="img-lb-nav img-lb-next" id="imgLbNext">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- VIDEO MODAL -->
    <div id="videoModal" class="video-modal">
        <button class="modal-close" id="videoModalClose">×</button>
        <div class="modal-content">
            <iframe id="modalIframe" src="" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        /* ═══════════════════════════════
           CONFIG
        ═══════════════════════════════ */
        const escapeHtml = (value = '') => String(value).replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));

        /* ═══════════════════════════════
           SCROLL NAV
        ═══════════════════════════════ */
        const navBar = document.getElementById('proj-nav-bar');
        window.addEventListener('scroll', () => {
            navBar.classList.toggle('scrolled', window.scrollY > 48);
        }, { passive: true });

        /* ═══════════════════════════════
           INTERSECTION OBSERVER
        ═══════════════════════════════ */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
        }, { threshold: 0.08 });

        function observeAll() {
            document.querySelectorAll('.reveal-up').forEach(el => observer.observe(el));
        }

        /* ═══════════════════════════════
           LIGHTBOX
        ═══════════════════════════════ */
        const imgLightbox = document.getElementById('imgLightbox');
        const lbImg = document.getElementById('lbImg');
        let lbImages = [];
        let currentLbIndex = 0;

        function openLightbox(index) {
            currentLbIndex = index;
            lbImg.src = lbImages[currentLbIndex];
            imgLightbox.classList.add('is-active');
        }

        function closeLightbox() {
            imgLightbox.classList.remove('is-active');
        }

        function lbNext() {
            currentLbIndex = (currentLbIndex + 1) % lbImages.length;
            lbImg.src = lbImages[currentLbIndex];
        }

        function lbPrev() {
            currentLbIndex = (currentLbIndex - 1 + lbImages.length) % lbImages.length;
            lbImg.src = lbImages[currentLbIndex];
        }

        document.getElementById('imgLightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('imgLbNext').addEventListener('click', (e) => { e.stopPropagation(); lbNext(); });
        document.getElementById('imgLbPrev').addEventListener('click', (e) => { e.stopPropagation(); lbPrev(); });
        imgLightbox.addEventListener('click', (e) => { if (e.target === imgLightbox) closeLightbox(); });

        document.addEventListener('keydown', (e) => {
            if (!imgLightbox.classList.contains('is-active')) return;
            if (e.key === 'ArrowRight') lbNext();
            if (e.key === 'ArrowLeft') lbPrev();
            if (e.key === 'Escape') closeLightbox();
        });

        /* ═══════════════════════════════
           VIDEO MODAL
        ═══════════════════════════════ */
        function getVideoConfig(url) {
            if (!url) return null;

            try {
                const parsed = new URL(url);
                const host = parsed.hostname.replace(/^www\./, '');
                const path = parsed.pathname;

                let youtubeId = '';
                if (host === 'youtu.be') {
                    youtubeId = path.slice(1).split('/')[0];
                } else if (host.includes('youtube.com')) {
                    if (path.startsWith('/watch')) youtubeId = parsed.searchParams.get('v') || '';
                    else if (path.startsWith('/shorts/')) youtubeId = path.split('/shorts/')[1].split('/')[0];
                    else if (path.startsWith('/embed/')) youtubeId = path.split('/embed/')[1].split('/')[0];
                }

                if (youtubeId) {
                    return {
                        embedUrl: `https://www.youtube-nocookie.com/embed/${youtubeId}?autoplay=1&playsinline=1&rel=0&controls=0&fs=0&disablekb=1&iv_load_policy=3&modestbranding=1`,
                        thumbnailUrl: `https://i.ytimg.com/vi/${youtubeId}/hqdefault.jpg`,
                        provider: 'youtube',
                        isShort: path.startsWith('/shorts/')
                    };
                }

                if (host.includes('vimeo.com')) {
                    const vimeoId = path.split('/').filter(Boolean).find((part) => /^\d+$/.test(part));
                    if (vimeoId) {
                        return {
                            embedUrl: `https://player.vimeo.com/video/${vimeoId}?autoplay=1&title=0&byline=0&portrait=0`,
                            thumbnailUrl: '',
                            provider: 'vimeo'
                        };
                    }
                }

                if (/\.(mp4|webm|ogg)(\?.*)?$/i.test(url)) {
                    return {
                        embedUrl: url,
                        thumbnailUrl: '',
                        provider: 'direct'
                    };
                }
            } catch (error) {
                console.warn('Unable to parse video URL', url, error);
            }

            return {
                embedUrl: '',
                thumbnailUrl: '',
                provider: 'external'
            };
        }

        function openVideoModal(url) {
            const video = getVideoConfig(url);
            if (!video) return;
            const modalContent = document.querySelector('.modal-content');

            if (!video.embedUrl) {
                window.open(url, '_blank', 'noopener');
                return;
            }

            modalContent.classList.remove('video-locked', 'video-youtube', 'video-vimeo', 'video-direct', 'video-external', 'video-landscape', 'video-shorts');
            modalContent.classList.add(`video-${video.provider}`);
            modalContent.classList.toggle('video-locked', video.provider === 'youtube');
            modalContent.classList.add(video.isShort ? 'video-shorts' : 'video-landscape');
            document.getElementById('modalIframe').src = video.embedUrl;
            document.getElementById('videoModal').classList.add('is-active');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('is-active');
            document.getElementById('modalIframe').src = '';
            document.querySelector('.modal-content').classList.remove('video-locked', 'video-youtube', 'video-vimeo', 'video-direct', 'video-external', 'video-landscape', 'video-shorts');
        }

        document.getElementById('videoModalClose').addEventListener('click', closeVideoModal);
        document.getElementById('videoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('videoModal')) closeVideoModal();
        });

        /* ═══════════════════════════════
           CANVAS DRAG SCROLL
        ═══════════════════════════════ */
        function enableCanvasDrag(canvas) {
            let isDown = false, startX, scrollLeft;
            canvas.addEventListener('mousedown', (e) => {
                isDown = true;
                canvas.style.cursor = 'grabbing';
                startX = e.pageX - canvas.offsetLeft;
                scrollLeft = canvas.scrollLeft;
            });
            canvas.addEventListener('mouseleave', () => { isDown = false; canvas.style.cursor = 'grab'; });
            canvas.addEventListener('mouseup', () => { isDown = false; canvas.style.cursor = 'grab'; });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - canvas.offsetLeft;
                const walk = (x - startX) * 1.5;
                canvas.scrollLeft = scrollLeft - walk;
            });
        }

        /* ═══════════════════════════════
           HELPER
        ═══════════════════════════════ */
        function getText(field) {
            if (!field) return '';
            if (typeof field === 'string') return field;
            if (Array.isArray(field)) {
                return field.map(block => block.text || '').join('\n\n');
            }
            if (field.text) return field.text;
            return '';
        }

        /* ═══════════════════════════════
           BUILD IMAGE CANVAS SECTION
        ═══════════════════════════════ */
        function buildCanvas(images) {
            if (!images || images.length === 0) return null;
            const startIndex = lbImages.length;

            // Outer wrapper holds hint + canvas + progress bar
            const wrap = document.createElement('div');
            wrap.className = 'canvas-wrap reveal-up';

            // Scroll hint header
            const hint = document.createElement('div');
            hint.className = 'canvas-scroll-hint';
            hint.innerHTML = `
                <span class="canvas-count">${images.length} Images</span>
                <span class="canvas-arrow-hint">Drag or scroll to explore</span>
            `;
            wrap.appendChild(hint);

            // The scrollable canvas row
            const canvas = document.createElement('section');
            canvas.className = 'proj-canvas';

            images.forEach((imgData, i) => {
                const { url, dimensions } = imgData;
                if (!url) return;
                lbImages.push(url);
                const isLandscape = dimensions ? dimensions.width >= dimensions.height : true;
                const isSquare = dimensions ? Math.abs(dimensions.width - dimensions.height) < 50 : false;
                const sizeCls = isSquare ? 'square' : (isLandscape ? 'landscape' : 'portrait');

                const mod = document.createElement('div');
                mod.className = `canvas-module ${sizeCls}`;
                mod.innerHTML = `<img src="${url}" class="canvas-img" alt="">`;
                mod.addEventListener('click', () => openLightbox(startIndex + i));
                canvas.appendChild(mod);
            });

            if (canvas.children.length === 0) return null;

            wrap.appendChild(canvas);

            // Progress bar below canvas
            const progressBar = document.createElement('div');
            progressBar.className = 'canvas-progress-bar';
            const progressFill = document.createElement('div');
            progressFill.className = 'canvas-progress-fill';
            progressBar.appendChild(progressFill);
            wrap.appendChild(progressBar);

            // Update progress fill on scroll
            canvas.addEventListener('scroll', () => {
                const maxScroll = canvas.scrollWidth - canvas.clientWidth;
                const pct = maxScroll > 0 ? (canvas.scrollLeft / maxScroll) * 100 : 30;
                progressFill.style.width = Math.max(5, pct) + '%';
                // Fade hint once user has scrolled
                if (pct > 10) hint.style.opacity = '0';
            }, { passive: true });

            enableCanvasDrag(canvas);
            return wrap;
        }

        /* ═══════════════════════════════
           MAIN DATA LOADER
        ═══════════════════════════════ */
        async function loadProject() {
            const uid = new URLSearchParams(window.location.search).get('uid');
            if (!uid) {
                document.getElementById('loading').innerHTML = 'Project not found.';
                return;
            }

            try {
                const docRes = await fetch(`/api/project?uid=${encodeURIComponent(uid)}`);
                if (!docRes.ok) throw new Error('Not found');
                const docData = await docRes.json();
                if (!docData.results || docData.results.length === 0) throw new Error('Not found');

                const d = docData.results[0].data;
                document.getElementById('loading').style.display = 'none';

                /* ── 1. TITLE & META ── */
                const title = d.project_title || getText(d.title) || 'Untitled';
                document.getElementById('title').innerText = title;
                document.title = `${title} | Rima Alshoufi`;

                // Category from project_category, type, or intro text
                let category = d.project_category || d.type || d.category || '';
                if (!category && d.intro?.[0]?.text) {
                    category = d.intro[0].text.split('|')[0].trim();
                }
                category = category || 'Project';

                let subcategory = d.project_subcategory || '';
                if (!subcategory && d.intro?.[0]?.text) {
                    const parts = d.intro[0].text.split('|');
                    if (parts.length > 1) subcategory = parts[1].trim();
                }

                const taxonomyEl = document.getElementById('taxonomy');
                taxonomyEl.innerHTML = `<span>${escapeHtml(category)}</span>`;
                if (subcategory) {
                    taxonomyEl.innerHTML += `<div class="proj-taxi-sep"></div><span>${escapeHtml(subcategory)}</span>`;
                }

                const essence = d.project_essence || getText(d.intro) || '';
                document.getElementById('essence').innerText = essence;

                const metaParts = [d.location, d.year, d.client].filter(Boolean);
                document.getElementById('meta').innerHTML = metaParts.map(p => `<span>${escapeHtml(p)}</span>`).join('');

                /* ── 2. HERO ── */
                const heroEl = document.getElementById('hero');
                const heroImg = d.hero_image?.url || d.main_image?.url || d.preview_image?.url || '';
                const heroVideo = d.hero_video?.url || '';

                const heroVideoConfig = getVideoConfig(heroVideo);
                const heroEmbed = heroVideoConfig?.provider === 'youtube'
                    ? `<iframe src="${heroVideoConfig.embedUrl}&mute=1&loop=1&playlist=${heroVideoConfig.embedUrl.split('/embed/')[1].split('?')[0]}&controls=0&modestbranding=1" frameborder="0" allow="autoplay; fullscreen" style="position:absolute;top:50%;left:50%;width:101vw;height:56.25vw;min-height:101%;min-width:100%;transform:translate(-50%,-50%);pointer-events:none;"></iframe>`
                    : '';

                if (heroImg) {
                    heroEl.innerHTML = `<img src="${heroImg}" alt="${escapeHtml(title)}">`;
                } else if (heroEmbed) {
                    heroEl.innerHTML = heroEmbed;
                    heroEl.style.position = 'relative';
                    heroEl.style.overflow = 'hidden';
                } else if (heroVideoConfig?.provider === 'direct' && heroVideo) {
                    heroEl.innerHTML = `<video autoplay muted loop playsinline src="${heroVideo}"></video>`;
                } else {
                    heroEl.innerHTML = `<div style="width:100%;height:100%;background:#e8e4de;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px;letter-spacing:.15em;text-transform:uppercase;">Image Pending</div>`;
                }
                heroEl.style.display = 'block';

                /* ── 3. INTRO SPLIT ── */
                // Sticky left title = concept tagline OR essence OR project title
                const stickyTitle = d.concept_tagline || essence || title;
                document.getElementById('sticky_title').innerText = stickyTitle;

                // The Challenge (was: ask_text / the_ask)
                const askText = getText(d.the_challenge) || getText(d.ask_text) || getText(d.the_ask) || '';
                // The Solution (was: solution_text)
                const solText = getText(d.the_solution) || getText(d.solution_text) || '';

                document.getElementById('ask_text').innerText = askText;
                document.getElementById('block_ask').style.display = askText ? '' : 'none';

                document.getElementById('response_text').innerText = solText;
                document.getElementById('block_response').style.display = solText ? '' : 'none';

                // Creative Leadership — from creative_leadership group (scope__ through scope_8)
                const scopeList = document.getElementById('scope_list');
                scopeList.innerHTML = '';
                let hasScope = false;

                const clGroup = d.creative_leadership;
                if (clGroup && clGroup.length > 0) {
                    const obj = clGroup[0];
                    // Keys: scope__, scope_2 … scope_8
                    Object.values(obj).forEach(val => {
                        if (val && typeof val === 'string' && val.trim()) {
                            scopeList.innerHTML += `<li class="proj-scope-item">${escapeHtml(val.trim())}</li>`;
                            hasScope = true;
                        }
                    });
                } else if (d.deliverables1 && d.deliverables1.length > 0) {
                    // Fallback: old deliverables1 group
                    const obj = d.deliverables1[0];
                    Object.values(obj).forEach(val => {
                        if (val && typeof val === 'string' && val.trim()) {
                            scopeList.innerHTML += `<li class="proj-scope-item">${escapeHtml(val.trim())}</li>`;
                            hasScope = true;
                        }
                    });
                } else if (d.scope && d.scope.length > 0) {
                    d.scope.forEach(s => {
                        const label = s.tag_label || s.item || '';
                        if (label) {
                            scopeList.innerHTML += `<li class="proj-scope-item">${escapeHtml(label)}</li>`;
                            hasScope = true;
                        }
                    });
                }
                document.getElementById('block_scope').style.display = hasScope ? '' : 'none';

                // Show intro section only if it has content
                if (askText || solText || hasScope) {
                    document.getElementById('intro').style.display = '';
                    document.getElementById('intro').classList.add('reveal-up');
                }

                /* ── 4. SHOW HEADER ── */
                document.getElementById('header').style.display = '';

                /* ── 5. STORY BLOCK ── */
                const story = document.getElementById('story_block');
                story.innerHTML = '';
                let hasStoryContent = false;

                // 5a. Concept section (from slices or top-level)
                const conceptTitle = getText(d.the_concept_title) || d.concept_name || '';
                const conceptBody = getText(d.concept_narrative) || getText(d.concept_body) || '';

                // Check if slices have concept
                let sliceHasConcept = false;
                if (d.slices && d.slices.length > 0) {
                    d.slices.forEach(slice => {
                        if (slice.slice_type === 'content_block' && slice.primary?.content) {
                            let html = '';
                            slice.primary.content.forEach(p => {
                                if (p.type === 'heading1' || p.type === 'heading2') {
                                    html += `<div class="proj-concept-name">${escapeHtml(p.text)}</div>`;
                                    sliceHasConcept = true;
                                } else if (p.type === 'paragraph' && p.text) {
                                    html += `<p class="proj-concept-body">${escapeHtml(p.text)}</p>`;
                                }
                            });
                            if (html) {
                                const sec = document.createElement('section');
                                sec.className = 'proj-concept reveal-up';
                                sec.innerHTML = `<span class="proj-concept-label">The Concept</span>${html}`;
                                story.appendChild(sec);
                                hasStoryContent = true;
                            }
                        }
                    });
                }

                // Fallback: top-level concept fields
                if (!sliceHasConcept && (conceptTitle || conceptBody)) {
                    const sec = document.createElement('section');
                    sec.className = 'proj-concept reveal-up';
                    sec.innerHTML = `
                        <span class="proj-concept-label">The Concept</span>
                        ${conceptTitle ? `<div class="proj-concept-name">${escapeHtml(conceptTitle)}</div>` : ''}
                        ${conceptBody ? `<p class="proj-concept-body">${escapeHtml(conceptBody)}</p>` : ''}
                    `;
                    story.appendChild(sec);
                    hasStoryContent = true;
                }

                // 5b. Image galleries — collect all images for lightbox
                let galleryImages = [];

                // From slices
                if (d.slices && d.slices.length > 0) {
                    d.slices.forEach(slice => {
                        if (slice.slice_type === 'image_gallery' && slice.items) {
                            slice.items.forEach(item => {
                                if (item.image?.url) {
                                    galleryImages.push({ url: item.image.url, dimensions: item.image.dimensions });
                                }
                            });
                        }
                    });
                }

                // From legacy top-level group fields: design_elements, completed_photos
                const legacyGalleryFields = [d.design_elements, d.completed_photos];
                legacyGalleryFields.forEach(gal => {
                    if (gal && gal.length > 0) {
                        // Each row is an object with keys like design_element_1, design_element_2...
                        gal.forEach(row => {
                            Object.keys(row).forEach(key => {
                                const item = row[key];
                                if (item?.url) {
                                    galleryImages.push({ url: item.url, dimensions: item.dimensions });
                                }
                            });
                        });
                    }
                });

                if (galleryImages.length > 0) {
                    const canvas = buildCanvas(galleryImages);
                    if (canvas) {
                        story.appendChild(canvas);
                        hasStoryContent = true;
                    }
                }

                // 5c. Films / Videos
                let videoItems = [];

                // From slices (if any video slice exists — future)
                // From legacy top-level videos field
                if (d.videos && d.videos.length > 0) {
                    d.videos.forEach(row => {
                        Object.keys(row).forEach(key => {
                            const vid = row[key];
                            if (vid?.url) videoItems.push(vid.url);
                        });
                    });
                }

                if (videoItems.length > 0) {
                    const filmsWrap = document.createElement('section');
                    filmsWrap.className = 'proj-films-wrap reveal-up';
                    filmsWrap.innerHTML = `<span class="proj-films-label">Films</span>`;
                    const grid = document.createElement('div');
                    grid.className = 'proj-films-grid';
                    if (videoItems.length === 1) grid.classList.add('has-single');

                    const videoConfigs = videoItems.map((url) => ({ url, video: getVideoConfig(url) }));
                    if (videoConfigs.length > 0 && videoConfigs.every((item) => item.video?.isShort)) {
                        grid.classList.add('all-short');
                    }

                    videoConfigs.forEach(({ url, video }) => {
                        const mod = document.createElement('div');
                        mod.className = `film-module${video?.isShort ? ' short' : ''}`;
                        mod.innerHTML = `
                            ${video?.thumbnailUrl ? `<img src="${video.thumbnailUrl}" class="film-cover" alt="Video preview">` : ''}
                            <div class="video-play-btn"><div class="video-play-icon"></div></div>
                            <div class="film-caption">Play film</div>
                        `;
                        mod.addEventListener('click', () => openVideoModal(url));
                        grid.appendChild(mod);
                    });

                    filmsWrap.appendChild(grid);
                    story.appendChild(filmsWrap);
                    hasStoryContent = true;
                }

                // 5d. Outcome / Proof
                const outcomeText = getText(d.outcome) || getText(d.proof_text) || '';
                if (outcomeText) {
                    const proofSec = document.createElement('section');
                    proofSec.className = 'proj-proof-wrap reveal-up';
                    proofSec.innerHTML = `
                        <div class="proj-proof-statement">${escapeHtml(outcomeText)}</div>
                    `;
                    story.appendChild(proofSec);
                    hasStoryContent = true;
                }

                if (hasStoryContent) {
                    story.style.display = '';
                }

                /* ── 6. FOOTER NAV ── */
                const footerNav = document.getElementById('footer_nav');
                const navContainer = document.getElementById('nav_container');
                navContainer.innerHTML = '';

                // Previous / Next from Prismic relations or just link back to work
                const prevProject = d.prev_project;
                const nextProject = d.next_project;

                if (prevProject?.id || nextProject?.id) {
                    // Fetch linked docs
                    const linkIds = [prevProject, nextProject].filter(p => p?.id).map(p => p.id);
                    if (linkIds.length > 0) {
                        try {
                            const linkedRes = await fetch(`/api/linked?ids=${encodeURIComponent(linkIds.join(','))}`);
                            const linkedData = await linkedRes.json();
                            const linkedMap = {};
                            linkedData.results.forEach(r => { linkedMap[r.id] = r; });

                            [{ label: 'Previous', ref: prevProject }, { label: 'Up Next', ref: nextProject }].forEach(({ label, ref: projRef }) => {
                                if (!projRef?.id) return;
                                const linked = linkedMap[projRef.id];
                                if (!linked) return;
                                const ld = linked.data;
                                const lTitle = ld.project_title || getText(ld.title) || 'Project';
                                const lImg = ld.preview_image?.url || ld.main_image?.url || '';
                                navContainer.innerHTML += `
                                    <a href="/projects/${encodeURIComponent(linked.uid)}" class="nav-card">
                                        <div class="nav-img-box">${lImg ? `<img src="${lImg}" alt="${escapeHtml(lTitle)}">` : ''}</div>
                                        <div class="nav-content">
                                            <span class="nav-label">${escapeHtml(label)}</span>
                                            <span class="nav-title">${escapeHtml(lTitle)}</span>
                                        </div>
                                    </a>
                                `;
                            });
                        } catch (e) { /* fail silently */ }
                    }
                }

                navContainer.classList.toggle('single', navContainer.children.length === 1);
                navContainer.style.display = navContainer.children.length ? '' : 'none';
                footerNav.style.display = '';

                /* ── OBSERVE ALL ── */
                observeAll();

            } catch (e) {
                console.error('Project load error:', e);
                document.getElementById('loading').innerHTML = 'Unable to load this project.';
            }
        }

        document.addEventListener('DOMContentLoaded', loadProject);
    </script>
</body>

</html>
