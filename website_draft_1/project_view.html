        /* ═══════════════════════════════════════════════
           PROJECT PAGE V5 — DYNAMIC EDITORIAL CAROUSEL
           Approved structure from project-khaltat-approved.html
           ═══════════════════════════════════════════════ */

        /* ─── NAV OVERRIDES ─── */
        .proj-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 26px var(--px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .proj-nav.scrolled {
            background: rgba(247, 245, 242, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px var(--px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
        }

        .proj-nav .logo {
            color: var(--bk);
            text-shadow: none;
        }

        .proj-nav .nav-links a {
            color: var(--bk);
            opacity: 0.55;
            text-shadow: none;
        }

        .proj-nav .nav-links a:hover {
            opacity: 1;
        }

        .proj-nav .nav-links a.cta {
            opacity: 1;
        }

        .proj-nav .nav-links a.cta span::after {
            background: var(--bk);
        }

        /* ─── ANIMATIONS ─── */
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.165, 0.84, 0.44, 1), transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .reveal-up.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── 1. HEADER ─── */
        .proj-header {
            padding: 120px var(--px) 64px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .proj-taxonomy {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--sd);
            margin-bottom: 24px;
        }

        .proj-taxi-sep {
            width: 16px;
            height: 0.5px;
            background: rgba(0, 0, 0, 0.1);
        }

        .proj-title {
            font-size: clamp(48px, 6.5vw, 92px);
            font-weight: 500;
            letter-spacing: -0.04em;
            line-height: 0.95;
            color: #0a0a0a;
            margin-bottom: 32px;
        }

        .proj-essence {
            font-size: clamp(18px, 2.2vw, 24px);
            font-weight: 300;
            line-height: 1.5;
            color: rgba(10, 10, 10, 0.6);
            max-width: 720px;
            margin-bottom: 56px;
        }

        .proj-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 24px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #0a0a0a;
            align-items: center;
        }

        .proj-meta span:not(:last-child)::after {
            content: "";
            width: 3px;
            height: 3px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
            display: inline-block;
            margin-left: 24px;
            vertical-align: middle;
        }

        /* ─── 2. HERO VISUAL ─── */
        .proj-hero {
            width: 100%;
            height: clamp(300px, 50vw, 680px); /* ≈ 16:9 proportional — compact */
            background: #e8e4de;
            position: relative;
            overflow: hidden;
        }

        .proj-hero img,
        .proj-hero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(0.9) brightness(0.97);
        }

        /* ─── 3. INTRO (STICKY SPLIT) ─── */
        .proj-intro-split {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px var(--px) 48px;
            display: flex;
            gap: 8vw;
            align-items: flex-start;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
        }

        .intro-left {
            flex: 1;
            position: sticky;
            top: 140px;
        }

        .intro-sticky-title {
            font-size: clamp(32px, 4vw, 42px);
            font-weight: 500;
            line-height: 1.25;
            letter-spacing: -0.02em;
            color: #0a0a0a;
            max-width: 520px;
            margin: 0;
        }

        .intro-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 64px;
        }

        .br-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--sd);
            margin-bottom: 16px;
            display: block;
        }

        .br-text {
            font-size: clamp(16px, 1.8vw, 19px);
            font-weight: 300;
            line-height: 1.7;
            color: rgba(10, 10, 10, 0.75);
            max-width: 560px;
        }

        /* ─── NARRATIVE STORY BLOCK ─── */
        .proj-story-block {
            background-color: #f9f8f6;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            padding: 64px 0;
            display: flex;
            flex-direction: column;
            gap: 64px;
        }

        .proj-concept {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            padding: 0 var(--px);
        }

        .proj-concept-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--sd);
            margin-bottom: 24px;
            display: block;
        }

        .proj-concept-name {
            font-size: clamp(40px, 5vw, 64px);
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: #0a0a0a;
            margin-bottom: 16px;
        }

        .proj-concept-body {
            font-size: clamp(18px, 2vw, 22px);
            font-weight: 300;
            line-height: 1.6;
            color: rgba(10, 10, 10, 0.65);
            max-width: 800px;
            margin: 0 auto;
        }

        /* ─── 5. HORIZONTAL CANVAS ─── */
        .proj-canvas {
            display: flex;
            gap: 20px;
            padding: 0 var(--px) 24px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
            justify-content: safe center; /* centers nicely when few items; aligns left safely when overflowing */
        }

        .proj-canvas:active {
            cursor: grabbing;
        }

        .proj-canvas::-webkit-scrollbar {
            display: none;
        }

        .canvas-module {
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .canvas-module.landscape {
            height: clamp(200px, 32vh, 400px);
            aspect-ratio: 16/10;
        }

        .canvas-module.portrait {
            height: clamp(200px, 32vh, 400px);
            aspect-ratio: 3/4;
        }

        .canvas-module.square {
            height: clamp(200px, 32vh, 400px);
            aspect-ratio: 1;
        }

        .canvas-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(0.9);
            transition: transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: none;
        }

        .canvas-module:hover .canvas-img {
            transform: scale(1.05);
        }

        /* ─── CANVAS SCROLL INDICATOR ─── */
        .canvas-wrap {
            position: relative;
        }

        .canvas-scroll-hint {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px var(--px) 0;
            pointer-events: none;
        }

        .canvas-count {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sd);
        }

        .canvas-arrow-hint {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--sd);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: nudge 2s ease-in-out infinite;
        }

        @keyframes nudge {
            0%, 100% { transform: translateX(0); opacity: 0.6; }
            50% { transform: translateX(6px); opacity: 1; }
        }

        .canvas-progress-bar {
            height: 1px;
            background: rgba(0,0,0,0.06);
            margin: 8px var(--px) 0;
            position: relative;
            overflow: hidden;
        }

        .canvas-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--bk);
            width: 30%;
            transition: width 0.3s ease;
        }

        /* ─── 6. FILMS GRID ─── */
        .proj-films-wrap {
            padding: 0 var(--px);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .proj-films-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--sd);
            margin-bottom: 24px;
            display: block;
        }

        .proj-films-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .film-module {
            position: relative;
            background: #e3e0db;
            aspect-ratio: 16/9;
            overflow: hidden;
            cursor: pointer;
            width: 320px;
            max-width: 100%;
        }

        .film-module.short {
            aspect-ratio: 9/16;
            max-width: 320px;
        }

        .film-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .film-module:hover .film-cover {
            transform: scale(1.05);
        }

        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: transform 0.3s ease, background 0.3s;
        }

        .film-module:hover .video-play-btn {
            transform: translate(-50%, -50%) scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        .video-play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 16px;
            border-color: transparent transparent transparent #fff;
            margin-left: 6px;
        }

        /* ─── 7. WHAT I LED ─── */
        .proj-scope {
            display: flex;
            flex-direction: column;
            gap: 12px;
            list-style: none;
            padding: 0;
            margin-top: 8px;
        }

        .proj-scope-item {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--bk);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .proj-scope-item::before {
            content: "";
            width: 4px;
            height: 4px;
            background: var(--br);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── 8. PROOF ─── */
        .proj-proof-wrap {
            padding: 0 var(--px);
            text-align: center;
        }

        .proj-proof-statement {
            max-width: 800px;
            margin: 0 auto;
            font-size: clamp(20px, 2.8vw, 26px);
            font-weight: 300;
            line-height: 1.7;
            color: rgba(10, 10, 10, 0.5);
        }

        .proj-proof-statement strong,
        .proj-proof-statement span {
            color: #0a0a0a;
            font-weight: 500;
        }

        /* ─── FOOTER NAV ─── */
        .proj-footer-nav {
            padding: 80px var(--px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.05);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .nav-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .nav-img-box {
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #f6f5f3;
        }

        .nav-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s;
        }

        .nav-card:hover .nav-img-box img {
            transform: scale(1.04);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--sd);
        }

        .nav-title {
            font-size: 24px;
            font-weight: 300;
            color: #0a0a0a;
        }

        /* ─── MODALS ─── */
        .video-modal,
        .img-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .video-modal.is-active,
        .img-lightbox.is-active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-close,
        .img-lightbox-close {
            position: absolute;
            top: 32px;
            right: var(--px);
            background: none;
            border: none;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            line-height: 1;
            z-index: 2;
        }

        .modal-content {
            width: 90%;
            max-width: 1400px;
            aspect-ratio: 16/9;
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .img-lb-content {
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-lb-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .img-lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.45);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 50%;
            z-index: 2;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-lb-nav:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .img-lb-nav svg {
            width: 24px;
            height: 24px;
            display: block;
        }

        .img-lb-prev { left: -72px; }
        .img-lb-next { right: -72px; }

        /* ─── LOADING ─── */
        #loading {
            padding: 180px var(--px);
            text-align: center;
            font-size: 16px;
            font-weight: 300;
            color: #666;
            min-height: 80vh;
        }

        /* ─── RESPONSIVE ─── */
        @media(max-width: 768px) {
            .proj-header {
                padding: 140px var(--px) 48px;
            }

            .proj-intro-split {
                flex-direction: column;
                gap: 48px;
            }

            .intro-left {
                position: relative;
                top: 0;
            }

            .proj-hero {
                height: 55vw;
                min-height: 260px;
            }

            .nav-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .img-lb-prev { left: -10px; }
            .img-lb-next { right: -10px; }
        }

        @media(max-width: 480px) {
            .proj-header, .proj-intro-split, .proj-proof-wrap, .proj-films-wrap {
                padding-left: 20px;
                padding-right: 20px;
            }

            .proj-canvas {
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>

    <script>
        /* ═══════════════════════════════
           CONFIG
        ═══════════════════════════════ */
        const escapeHtml = (value = '') => String(value).replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));

        /* ═══════════════════════════════
           SCROLL NAV
        ═══════════════════════════════ */
        const navBar = document.getElementById('proj-nav-bar');
        window.addEventListener('scroll', () => {
            navBar.classList.toggle('scrolled', window.scrollY > 48);
        }, { passive: true });

        /* ═══════════════════════════════
           INTERSECTION OBSERVER
        ═══════════════════════════════ */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
        }, { threshold: 0.08 });

        function observeAll() {
            document.querySelectorAll('.reveal-up').forEach(el => observer.observe(el));
        }

        /* ═══════════════════════════════
           LIGHTBOX
        ═══════════════════════════════ */
        const imgLightbox = document.getElementById('imgLightbox');
        const lbImg = document.getElementById('lbImg');
        let lbImages = [];
        let currentLbIndex = 0;

        function openLightbox(index) {
            currentLbIndex = index;
            lbImg.src = lbImages[currentLbIndex];
            imgLightbox.classList.add('is-active');
        }

        function closeLightbox() {
            imgLightbox.classList.remove('is-active');
        }

        function lbNext() {
            currentLbIndex = (currentLbIndex + 1) % lbImages.length;
            lbImg.src = lbImages[currentLbIndex];
        }

        function lbPrev() {
            currentLbIndex = (currentLbIndex - 1 + lbImages.length) % lbImages.length;
            lbImg.src = lbImages[currentLbIndex];
        }

        document.getElementById('imgLightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('imgLbNext').addEventListener('click', (e) => { e.stopPropagation(); lbNext(); });
        document.getElementById('imgLbPrev').addEventListener('click', (e) => { e.stopPropagation(); lbPrev(); });
        imgLightbox.addEventListener('click', (e) => { if (e.target === imgLightbox) closeLightbox(); });

        document.addEventListener('keydown', (e) => {
            if (!imgLightbox.classList.contains('is-active')) return;
            if (e.key === 'ArrowRight') lbNext();
            if (e.key === 'ArrowLeft') lbPrev();
            if (e.key === 'Escape') closeLightbox();
        });

        /* ═══════════════════════════════
           VIDEO MODAL
        ═══════════════════════════════ */
        function openVideoModal(url) {
            document.getElementById('modalIframe').src = url;
            document.getElementById('videoModal').classList.add('is-active');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('is-active');
            document.getElementById('modalIframe').src = '';
        }

        document.getElementById('videoModalClose').addEventListener('click', closeVideoModal);
        document.getElementById('videoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('videoModal')) closeVideoModal();
        });

        /* ═══════════════════════════════
           CANVAS DRAG SCROLL
        ═══════════════════════════════ */
        function enableCanvasDrag(canvas) {
            let isDown = false, startX, scrollLeft;
            canvas.addEventListener('mousedown', (e) => {
                isDown = true;
                canvas.style.cursor = 'grabbing';
                startX = e.pageX - canvas.offsetLeft;
                scrollLeft = canvas.scrollLeft;
            });
            canvas.addEventListener('mouseleave', () => { isDown = false; canvas.style.cursor = 'grab'; });
            canvas.addEventListener('mouseup', () => { isDown = false; canvas.style.cursor = 'grab'; });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - canvas.offsetLeft;
                const walk = (x - startX) * 1.5;
                canvas.scrollLeft = scrollLeft - walk;
            });
        }

        /* ═══════════════════════════════
           HELPER
        ═══════════════════════════════ */
        function getText(field) {
            if (!field) return '';
            if (typeof field === 'string') return field;
            if (Array.isArray(field)) {
                return field.map(block => block.text || '').join('\n\n');
            }
            if (field.text) return field.text;
            return '';
        }

        /* ═══════════════════════════════
           BUILD IMAGE CANVAS SECTION
        ═══════════════════════════════ */
        function buildCanvas(images) {
            if (!images || images.length === 0) return null;
            const startIndex = lbImages.length;

            // Outer wrapper holds hint + canvas + progress bar
            const wrap = document.createElement('div');
            wrap.className = 'canvas-wrap reveal-up';

            // Scroll hint header
            const hint = document.createElement('div');
            hint.className = 'canvas-scroll-hint';
            hint.innerHTML = `
                <span class="canvas-count">${images.length} Images</span>
                <span class="canvas-arrow-hint">Scroll to explore &nbsp;→</span>
            `;
            wrap.appendChild(hint);

            // The scrollable canvas row
            const canvas = document.createElement('section');
            canvas.className = 'proj-canvas';

            images.forEach((imgData, i) => {
                const { url, dimensions } = imgData;
                if (!url) return;
                lbImages.push(url);
                const isLandscape = dimensions ? dimensions.width >= dimensions.height : true;
                const isSquare = dimensions ? Math.abs(dimensions.width - dimensions.height) < 50 : false;
                const sizeCls = isSquare ? 'square' : (isLandscape ? 'landscape' : 'portrait');

                const mod = document.createElement('div');
                mod.className = `canvas-module ${sizeCls}`;
                mod.innerHTML = `<img src="${url}" class="canvas-img" alt="">`;
                mod.addEventListener('click', () => openLightbox(startIndex + i));
                canvas.appendChild(mod);
            });

            if (canvas.children.length === 0) return null;

            wrap.appendChild(canvas);

            // Progress bar below canvas
            const progressBar = document.createElement('div');
            progressBar.className = 'canvas-progress-bar';
            const progressFill = document.createElement('div');
            progressFill.className = 'canvas-progress-fill';
            progressBar.appendChild(progressFill);
            wrap.appendChild(progressBar);

            // Update progress fill on scroll
            canvas.addEventListener('scroll', () => {
                const maxScroll = canvas.scrollWidth - canvas.clientWidth;
                const pct = maxScroll > 0 ? (canvas.scrollLeft / maxScroll) * 100 : 30;
                progressFill.style.width = Math.max(5, pct) + '%';
                // Fade hint once user has scrolled
                if (pct > 10) hint.style.opacity = '0';
            }, { passive: true });

            enableCanvasDrag(canvas);
            return wrap;
        }

        /* ═══════════════════════════════
           MAIN DATA LOADER
        ═══════════════════════════════ */
        async function loadProject() {
            const uid = new URLSearchParams(window.location.search).get('uid');
            if (!uid) {
                document.getElementById('loading').innerHTML = 'Project not found.';
                return;
            }

            try {
                const docRes = await fetch(`/api/project?uid=${encodeURIComponent(uid)}`);
                if (!docRes.ok) throw new Error('Not found');
                const docData = await docRes.json();
                if (!docData.results || docData.results.length === 0) throw new Error('Not found');

                const d = docData.results[0].data;
                document.getElementById('loading').style.display = 'none';

                /* ── 1. TITLE & META ── */
                const title = d.project_title || getText(d.title) || 'Untitled';
                document.getElementById('title').innerText = title;
                document.title = `${title} | Rima Alshoufi`;

                // Category from project_category, type, or intro text
                let category = d.project_category || d.type || d.category || '';
                if (!category && d.intro?.[0]?.text) {
                    category = d.intro[0].text.split('|')[0].trim();
                }
                category = category || 'Project';

                let subcategory = d.project_subcategory || '';
                if (!subcategory && d.intro?.[0]?.text) {
                    const parts = d.intro[0].text.split('|');
                    if (parts.length > 1) subcategory = parts[1].trim();
                }

                const taxonomyEl = document.getElementById('taxonomy');
                taxonomyEl.innerHTML = `<span>${escapeHtml(category)}</span>`;
                if (subcategory) {
                    taxonomyEl.innerHTML += `<div class="proj-taxi-sep"></div><span>${escapeHtml(subcategory)}</span>`;
                }

                const essence = d.project_essence || getText(d.intro) || '';
                document.getElementById('essence').innerText = essence;

                const metaParts = [d.location, d.year, d.client].filter(Boolean);
                document.getElementById('meta').innerHTML = metaParts.map(p => `<span>${escapeHtml(p)}</span>`).join('');

                /* ── 2. HERO ── */
                const heroEl = document.getElementById('hero');
                const heroImg = d.hero_image?.url || d.main_image?.url || d.preview_image?.url || '';
                const heroVideo = d.hero_video?.url || '';

                function getYoutubeEmbed(url) {
                    if (!url) return '';
                    let id = '';
                    if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
                    else if (url.includes('youtube.com/watch')) id = new URLSearchParams(new URL(url).search).get('v');
                    else if (url.includes('youtube.com/embed/')) id = url.split('youtube.com/embed/')[1].split('?')[0];
                    if (id) {
                        return `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0&showinfo=0&modestbranding=1&rel=0&playsinline=1" frameborder="0" allow="autoplay; fullscreen" style="position:absolute;top:50%;left:50%;width:101vw;height:56.25vw;min-height:101%;min-width:100%;transform:translate(-50%,-50%);pointer-events:none;"></iframe>`;
                    }
                    return '';
                }

                const ytEmbed = getYoutubeEmbed(heroVideo);

                if (heroImg) {
                    heroEl.innerHTML = `<img src="${heroImg}" alt="${escapeHtml(title)}">`;
                } else if (ytEmbed) {
                    heroEl.innerHTML = ytEmbed;
                    heroEl.style.position = 'relative';
                    heroEl.style.overflow = 'hidden';
                } else if (heroVideo) {
                    heroEl.innerHTML = `<video autoplay muted loop playsinline src="${heroVideo}"></video>`;
                } else {
                    heroEl.innerHTML = `<div style="width:100%;height:100%;background:#e8e4de;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px;letter-spacing:.15em;text-transform:uppercase;">Image Pending</div>`;
                }
                heroEl.style.display = 'block';

                /* ── 3. INTRO SPLIT ── */
                // Sticky left title = concept tagline OR essence OR project title
                const stickyTitle = d.concept_tagline || essence || title;
                document.getElementById('sticky_title').innerText = stickyTitle;

                // The Challenge (was: ask_text / the_ask)
                const askText = getText(d.the_challenge) || getText(d.ask_text) || getText(d.the_ask) || '';
                // The Solution (was: solution_text)
                const solText = getText(d.the_solution) || getText(d.solution_text) || '';

                document.getElementById('ask_text').innerText = askText;
                document.getElementById('block_ask').style.display = askText ? '' : 'none';

                document.getElementById('response_text').innerText = solText;
                document.getElementById('block_response').style.display = solText ? '' : 'none';

                // Creative Leadership — from creative_leadership group (scope__ through scope_8)
                const scopeList = document.getElementById('scope_list');
                scopeList.innerHTML = '';
                let hasScope = false;

                const clGroup = d.creative_leadership;
                if (clGroup && clGroup.length > 0) {
                    const obj = clGroup[0];
                    // Keys: scope__, scope_2 … scope_8
                    Object.values(obj).forEach(val => {
                        if (val && typeof val === 'string' && val.trim()) {
                            scopeList.innerHTML += `<li class="proj-scope-item">${escapeHtml(val.trim())}</li>`;
                            hasScope = true;
                        }
                    });
                } else if (d.deliverables1 && d.deliverables1.length > 0) {
                    // Fallback: old deliverables1 group
                    const obj = d.deliverables1[0];
                    Object.values(obj).forEach(val => {
                        if (val && typeof val === 'string' && val.trim()) {
                            scopeList.innerHTML += `<li class="proj-scope-item">${escapeHtml(val.trim())}</li>`;
                            hasScope = true;
                        }
                    });
                } else if (d.scope && d.scope.length > 0) {
                    d.scope.forEach(s => {
                        const label = s.tag_label || s.item || '';
                        if (label) {
                            scopeList.innerHTML += `<li class="proj-scope-item">${escapeHtml(label)}</li>`;
                            hasScope = true;
                        }
                    });
                }
                document.getElementById('block_scope').style.display = hasScope ? '' : 'none';

                // Show intro section only if it has content
                if (askText || solText || hasScope) {
                    document.getElementById('intro').style.display = '';
                    document.getElementById('intro').classList.add('reveal-up');
                }

                /* ── 4. SHOW HEADER ── */
                document.getElementById('header').style.display = '';

                /* ── 5. STORY BLOCK ── */
                const story = document.getElementById('story_block');
                story.innerHTML = '';
                let hasStoryContent = false;

                // 5a. Concept section (from slices or top-level)
                const conceptTitle = getText(d.the_concept_title) || d.concept_name || '';
                const conceptBody = getText(d.concept_narrative) || getText(d.concept_body) || '';

                // Check if slices have concept
                let sliceHasConcept = false;
                if (d.slices && d.slices.length > 0) {
                    d.slices.forEach(slice => {
                        if (slice.slice_type === 'content_block' && slice.primary?.content) {
                            let html = '';
                            slice.primary.content.forEach(p => {
                                if (p.type === 'heading1' || p.type === 'heading2') {
                                    html += `<div class="proj-concept-name">${escapeHtml(p.text)}</div>`;
                                    sliceHasConcept = true;
                                } else if (p.type === 'paragraph' && p.text) {
                                    html += `<p class="proj-concept-body">${escapeHtml(p.text)}</p>`;
                                }
                            });
                            if (html) {
                                const sec = document.createElement('section');
                                sec.className = 'proj-concept reveal-up';
                                sec.innerHTML = `<span class="proj-concept-label">The Concept</span>${html}`;
                                story.appendChild(sec);
                                hasStoryContent = true;
                            }
                        }
                    });
                }

                // Fallback: top-level concept fields
                if (!sliceHasConcept && (conceptTitle || conceptBody)) {
                    const sec = document.createElement('section');
                    sec.className = 'proj-concept reveal-up';
                    sec.innerHTML = `
                        <span class="proj-concept-label">The Concept</span>
                        ${conceptTitle ? `<div class="proj-concept-name">${escapeHtml(conceptTitle)}</div>` : ''}
                        ${conceptBody ? `<p class="proj-concept-body">${escapeHtml(conceptBody)}</p>` : ''}
                    `;
                    story.appendChild(sec);
                    hasStoryContent = true;
                }

                // 5b. Image galleries — collect all images for lightbox
                let galleryImages = [];

                // From slices
                if (d.slices && d.slices.length > 0) {
                    d.slices.forEach(slice => {
                        if (slice.slice_type === 'image_gallery' && slice.items) {
                            slice.items.forEach(item => {
                                if (item.image?.url) {
                                    galleryImages.push({ url: item.image.url, dimensions: item.image.dimensions });
                                }
                            });
                        }
                    });
                }

                // From legacy top-level group fields: design_elements, completed_photos
                const legacyGalleryFields = [d.design_elements, d.completed_photos];
                legacyGalleryFields.forEach(gal => {
                    if (gal && gal.length > 0) {
                        // Each row is an object with keys like design_element_1, design_element_2...
                        gal.forEach(row => {
                            Object.keys(row).forEach(key => {
                                const item = row[key];
                                if (item?.url) {
                                    galleryImages.push({ url: item.url, dimensions: item.dimensions });
                                }
                            });
                        });
                    }
                });

                if (galleryImages.length > 0) {
                    const canvas = buildCanvas(galleryImages);
                    if (canvas) {
                        story.appendChild(canvas);
                        hasStoryContent = true;
                    }
                }

                // 5c. Films / Videos
                let videoItems = [];

                // From slices (if any video slice exists — future)
                // From legacy top-level videos field
                if (d.videos && d.videos.length > 0) {
                    d.videos.forEach(row => {
                        Object.keys(row).forEach(key => {
                            const vid = row[key];
                            if (vid?.url) videoItems.push(vid.url);
                        });
                    });
                }

                if (videoItems.length > 0) {
                    const filmsWrap = document.createElement('section');
                    filmsWrap.className = 'proj-films-wrap reveal-up';
                    filmsWrap.innerHTML = `<span class="proj-films-label">Films</span>`;
                    const grid = document.createElement('div');
                    grid.className = 'proj-films-grid';

                    videoItems.forEach(url => {
                        const mod = document.createElement('div');
                        mod.className = 'film-module short';
                        mod.innerHTML = `<div class="video-play-btn"><div class="video-play-icon"></div></div>`;
                        mod.addEventListener('click', () => openVideoModal(url));
                        grid.appendChild(mod);
                    });

                    filmsWrap.appendChild(grid);
                    story.appendChild(filmsWrap);
                    hasStoryContent = true;
                }

                // 5d. Outcome / Proof
                const outcomeText = getText(d.outcome) || getText(d.proof_text) || '';
                if (outcomeText) {
                    const proofSec = document.createElement('section');
                    proofSec.className = 'proj-proof-wrap reveal-up';
                    proofSec.innerHTML = `
                        <div class="proj-proof-statement">${escapeHtml(outcomeText)}</div>
                    `;
                    story.appendChild(proofSec);
                    hasStoryContent = true;
                }

                if (hasStoryContent) {
                    story.style.display = '';
                }

                /* ── 6. FOOTER NAV ── */
                const footerNav = document.getElementById('footer_nav');
                const navContainer = document.getElementById('nav_container');
                navContainer.innerHTML = '';

                // Previous / Next from Prismic relations or just link back to work
                const prevProject = d.prev_project;
                const nextProject = d.next_project;

                if (prevProject?.id || nextProject?.id) {
                    // Fetch linked docs
                    const linkIds = [prevProject, nextProject].filter(p => p?.id).map(p => p.id);
                    if (linkIds.length > 0) {
                        try {
                            const linkedRes = await fetch(`/api/linked?ids=${encodeURIComponent(linkIds.join(','))}`);
                            const linkedData = await linkedRes.json();
                            const linkedMap = {};
                            linkedData.results.forEach(r => { linkedMap[r.id] = r; });

                            [{ label: 'Previous', ref: prevProject }, { label: 'Up Next', ref: nextProject }].forEach(({ label, ref: projRef }) => {
                                if (!projRef?.id) return;
                                const linked = linkedMap[projRef.id];
                                if (!linked) return;
                                const ld = linked.data;
                                const lTitle = ld.project_title || getText(ld.title) || 'Project';
                                const lImg = ld.preview_image?.url || ld.main_image?.url || '';
                                navContainer.innerHTML += `
                                    <a href="project_view.html?uid=${encodeURIComponent(linked.uid)}" class="nav-card">
                                        <div class="nav-img-box">${lImg ? `<img src="${lImg}" alt="${escapeHtml(lTitle)}">` : ''}</div>
                                        <div class="nav-content">
                                            <span class="nav-label">${escapeHtml(label)}</span>
                                            <span class="nav-title">${escapeHtml(lTitle)}</span>
                                        </div>
                                    </a>
                                `;
                            });
                        } catch (e) { /* fail silently */ }
                    }
                }

                if (navContainer.children.length > 0) {
                    footerNav.style.display = '';
                }

                /* ── OBSERVE ALL ── */
                observeAll();

            } catch (e) {
                console.error('Project load error:', e);
                document.getElementById('loading').innerHTML = 'Unable to load this project.';
            }
        }

        document.addEventListener('DOMContentLoaded', loadProject);
    </script>
